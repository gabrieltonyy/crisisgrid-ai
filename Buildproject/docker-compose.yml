# docker-compose.yml
version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: crisisgrid-postgres
    environment:
      POSTGRES_DB: crisisgrid
      POSTGRES_USER: crisisgrid
      POSTGRES_PASSWORD: crisisgrid_password
    ports:
      - "5432:5432"
    volumes:
      - crisisgrid_postgres_data:/var/lib/postgresql/data

volumes:
  crisisgrid_postgres_data: